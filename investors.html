<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="WishOcean Group">
  <title>投资者关系 - WishOcean Group</title>
  <style>
    :root {
      --bg: #0b0a07;
      --text: #f5e7c8;
      --gold: #c9a03d;
      --gold-l: #ffd700;
      --border: #b49450;
      --font: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.8;
      min-height: 100vh;
    }
    nav {
      background: rgba(18, 16, 12, 0.95);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: var(--gold);
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }
    nav a.active, nav a:hover {
      color: var(--gold-l);
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .banner {
      text-align: center;
      padding: 80px 20px;
      background-size: cover;
      background-position: center;
      background-color: #1a160a;
      color: var(--gold-l);
    }
    .banner h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .banner p {
      font-size: 18px;
      color: var(--text);
    }
    section {
      margin-bottom: 40px;
    }
    h1 {
      color: var(--gold-l);
      margin-bottom: 20px;
      font-size: 28px;
    }
    h2 {
      color: var(--gold);
      margin-bottom: 12px;
      font-size: 20px;
    }
    h3 {
      color: var(--gold-l);
      margin-bottom: 8px;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .service-card {
      background: #12100c;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .service-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
      color: var(--dim);
      font-size: 13px;
    }
    footer a {
      color: var(--gold);
      margin: 0 8px;
      text-decoration: none;
    }
    footer a:hover {
      color: var(--gold-l);
    }
    @media(max-width: 600px) {
      .banner h1 { font-size: 26px; }
      .banner p { font-size: 15px; }
      nav ul { gap: 10px; }
    }
  </style>
</head>

                <h1>投资者关系</h1>
                
                <p>WishOcean目前处于产品矩阵完善和用户生态建设阶段。公司采用平台加工具矩阵的轻资产运营模式，通过分层会员体系实现商业化。当前核心产品已全部完成开发并投入使用，用户反馈良好。WishOcean始终坚持以用户价值为核心驱动力。所有基础工具将永久对用户开放，高级工具和企业级服务将通过合理的分级定价实现可持续运营。</p></div>
