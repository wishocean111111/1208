<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="WishOcean Group">
  <title>董事长致辞 - WishOcean Group</title>
  <style>
    :root {
      --bg: #0b0a07;
      --text: #f5e7c8;
      --gold: #c9a03d;
      --gold-l: #ffd700;
      --border: #b49450;
      --font: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.8;
      min-height: 100vh;
    }
    nav {
      background: rgba(18, 16, 12, 0.95);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: var(--gold);
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }
    nav a.active, nav a:hover {
      color: var(--gold-l);
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .banner {
      text-align: center;
      padding: 80px 20px;
      background-size: cover;
      background-position: center;
      background-color: #1a160a;
      color: var(--gold-l);
    }
    .banner h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .banner p {
      font-size: 18px;
      color: var(--text);
    }
    section {
      margin-bottom: 40px;
    }
    h1 {
      color: var(--gold-l);
      margin-bottom: 20px;
      font-size: 28px;
    }
    h2 {
      color: var(--gold);
      margin-bottom: 12px;
      font-size: 20px;
    }
    h3 {
      color: var(--gold-l);
      margin-bottom: 8px;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .service-card {
      background: #12100c;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .service-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
      color: var(--dim);
      font-size: 13px;
    }
    footer a {
      color: var(--gold);
      margin: 0 8px;
      text-decoration: none;
    }
    footer a:hover {
      color: var(--gold-l);
    }
    @media(max-width: 600px) {
      .banner h1 { font-size: 26px; }
      .banner p { font-size: 15px; }
      nav ul { gap: 10px; }
    }
  </style>
</head>
<body>

                <h1>董事长致辞</h1>
                
                <p>我一直相信，技术不应该是少数人的特权。在AI时代全面到来的今天，每个人都有权利拥有属于自己的数字工具，用自己的方式表达想法、创造价值。WishOcean的诞生，正是基于这样一个简单的信念：让工具服务于人，而非人受制于工具。</p></div>
